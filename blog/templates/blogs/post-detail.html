{% extends "base.html" %}

{% block title %}
  <title>Blog</title>
{% endblock title %}
{% block content %}
  <!-- Page content-->
  <div class="container-xl">
    <div class="row">
      <!-- Blog entries-->
      <div class="col-md-12 order-md-0">
        <!-- Featured blog post-->
        <div class="card mb-5 border-0">
          <div class="card-body">
            <h2 class="d-flex mb-3 fs-7 text-muted">{{ post.title }}</h2>
            <div class="card-text">{{ post.author }}</div>
            <div class="card-text">
              <small class="text-muted">{{ post.created_at|date:"F d, Y" }}</small>
            </div>
            <img src="{{ post.featured_image.url }}"
                 alt="{{ post.title }}"
                 class="post-detail-image" />
            <div class="post-body">{{ post.body }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
